AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  SuggestExtensions: false

# Double quotes are idiomatic and let authors add interpolation later
# without a mechanical rewrite.
Style/StringLiterals:
  EnforcedStyle: double_quotes

# Client methods are thin wrappers; reasonable method size is fine.
Metrics/MethodLength:
  Max: 35

Metrics/AbcSize:
  Max: 30

Metrics/ClassLength:
  Max: 200

# handle_response does one case/when per HTTP status — ten branches is fine.
Metrics/CyclomaticComplexity:
  Max: 12

Metrics/ParameterLists:
  CountKeywordArgs: false

# Specs naturally have long describe blocks.
Metrics/BlockLength:
  Exclude:
    - "spec/**/*.rb"
    - "unirate-api.gemspec"

Layout/LineLength:
  Max: 120
